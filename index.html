<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Grid - 500 Words</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --box-size: 40px;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container chính chứa 500 ô vuông */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--box-size), 1fr));
            gap: 4px;
            width: 95vw;
            max-width: 1200px;
            padding: 20px;
        }

        /* Phong cách ô vuông */
        .box {
            width: var(--box-size);
            height: var(--box-size);
            background-color: #1e293b;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .box:hover {
            transform: scale(1.2);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            border-color: #00f2fe;
        }

        /* Hiệu ứng khi đã nhấn vào */
        .box.active {
            background: linear-gradient(45deg, #00f2fe 0%, #4facfe 100%);
            width: auto;
            min-width: var(--box-size);
            padding: 0 10px;
            z-index: 5;
        }

        .word-text {
            color: white;
            font-size: 10px;
            font-weight: bold;
            opacity: 0;
            white-space: nowrap;
            pointer-events: none;
        }

        .box.active .word-text {
            opacity: 1;
            font-size: 12px;
        }

        /* Hiệu ứng huyền ảo cho toàn trang */
        #background-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="background-glow"></div>
    <div id="grid-container"></div>

    <script>
        const container = document.getElementById('grid-container');
        
        // Danh sách từ vựng mẫu (Bạn có thể thay đổi hoặc mở rộng)
        const vocabulary = [
            "Serendipity", "Ephemeral", "Luminous", "Resilient", "Eloquent", 
            "Melancholy", "Quintessential", "Vibrant", "Enigma", "Pristine",
            "Effervescent", "Ineffable", "Solitude", "Aurora", "Petrichor"
        ];

        // Tạo 500 ô vuông
        for (let i = 1; i <= 500; i++) {
            const box = document.createElement('div');
            box.className = 'box';
            
            // Tạo màu sắc ngẫu nhiên nhẹ cho mỗi ô để trông "kì lạ"
            const hue = Math.floor(Math.random() * 360);
            box.style.borderBottom = `2px solid hsla(${hue}, 70%, 50%, 0.3)`;

            const wordSpan = document.createElement('span');
            wordSpan.className = 'word-text';
            
            // Lấy ngẫu nhiên từ trong danh sách
            const randomWord = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            wordSpan.innerText = `${randomWord}`;

            box.appendChild(wordSpan);

            // Sự kiện khi click
            box.addEventListener('click', function() {
                this.classList.toggle('active');
                
                // Hiệu ứng rung nhẹ khi chọn
                if(this.classList.contains('active')) {
                    this.style.transform = "scale(1.5)";
                    setTimeout(() => {
                        this.style.transform = "scale(1.2)";
                    }, 200);
                }
            });

            container.appendChild(box);
        }
    </script>
</body>
</html>
